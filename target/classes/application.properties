spring.application.name=backend-sensor
server.port=${SERVER_PORT:8097}

# Database configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/iot_sensors_database}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA configuration
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.defer-datasource-initialization=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.sql.init.mode=${SPRING_SQL_INIT_MODE:never}

# Redis
spring.data.redis.timeout=3s

# Mail and auth
security.jwt.secret=${SECURITY_JWT_SECRET:ChangeThisSecretToAtLeast32CharsLong}
security.jwt.expiration-ms=${SECURITY_JWT_EXPIRATION_MS:3600000}
security.jwt.cookie-name=${SECURITY_JWT_COOKIE_NAME:AUTH_TOKEN}
security.jwt.cookie-secure=${SECURITY_JWT_COOKIE_SECURE:false}
security.jwt.cookie-max-age-seconds=${SECURITY_JWT_COOKIE_MAX_AGE_SECONDS:3600}
security.otp.super-admin-email=${SECURITY_OTP_SUPER_ADMIN_EMAIL:sandeep.s@wowinfobiz.com}
security.otp.ttl-seconds=${SECURITY_OTP_TTL_SECONDS:300}

spring.mail.host=${SPRING_MAIL_HOST:smtp.rediffmailpro.com}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:sandeep.s@wowinfobiz.com}
spring.mail.password=${SPRING_MAIL_PASSWORD:S@10may1999}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Kafka
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:${KAFKA_HOST:localhost}:${KAFKA_PORT:9092}}
spring.kafka.consumer.group-id=${KAFKA_GROUP_ID:${spring.application.name}-group}
spring.kafka.consumer.auto-offset-reset=${KAFKA_AUTO_OFFSET_RESET:earliest}
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.ByteArrayDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.consumer.properties.spring.json.value.default.type=java.util.LinkedHashMap
spring.kafka.consumer.properties.reconnect.backoff.ms=1000
spring.kafka.consumer.properties.reconnect.backoff.max.ms=10000
spring.kafka.consumer.properties.retry.backoff.ms=1000
spring.kafka.consumer.properties.request.timeout.ms=30000
spring.kafka.consumer.properties.session.timeout.ms=45000
spring.kafka.consumer.properties.max.poll.interval.ms=300000
spring.kafka.listener.missing-topics-fatal=false
spring.kafka.listener.poll-timeout=3000
spring.kafka.listener.concurrency=${KAFKA_LISTENER_CONCURRENCY:1}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.properties.spring.json.add.type.headers=false

app.kafka.topics.ingestion=${KAFKA_INGESTION_TOPIC:ingestion.sensor.raw}
app.kafka.topics.threshold=${KAFKA_THRESHOLD_TOPIC:threshold.sensor.processed}
app.kafka.topics.analytics=${KAFKA_ANALYTICS_TOPIC:analytics.sensor.events}
app.kafka.topics.notification=${KAFKA_NOTIFICATION_TOPIC:notifications-topic}
app.kafka.listener.enabled=${KAFKA_LISTENER_ENABLED:false}
app.kafka.manual-polling.enabled=${KAFKA_MANUAL_POLLING_ENABLED:false}
app.kafka.manual-polling.initial-delay-ms=${KAFKA_MANUAL_POLLING_INITIAL_DELAY_MS:5000}
app.kafka.manual-polling.fixed-delay-ms=${KAFKA_MANUAL_POLLING_DELAY_MS:3000}
app.kafka.manual-polling.poll-timeout-ms=${KAFKA_MANUAL_POLLING_TIMEOUT_MS:3000}
app.kafka.manual-polling.max-records=${KAFKA_MANUAL_POLLING_MAX_RECORDS:200}
app.kafka.manual-polling.startup-replay-enabled=${KAFKA_MANUAL_POLLING_STARTUP_REPLAY_ENABLED:false}
app.kafka.manual-polling.startup-replay-records=${KAFKA_MANUAL_POLLING_STARTUP_REPLAY_RECORDS:500}
app.kafka.analytics.poller-enabled=${KAFKA_ANALYTICS_POLLER_ENABLED:false}
app.kafka.analytics.startup-replay-enabled=${KAFKA_ANALYTICS_STARTUP_REPLAY_ENABLED:false}
app.kafka.analytics.startup-replay-records=${KAFKA_ANALYTICS_STARTUP_REPLAY_RECORDS:200}
app.kafka.analytics.poll-interval-ms=${KAFKA_ANALYTICS_POLL_INTERVAL_MS:100}
app.kafka.threshold.startup-replay-enabled=${KAFKA_THRESHOLD_STARTUP_REPLAY_ENABLED:false}
app.kafka.threshold.startup-replay-records=${KAFKA_THRESHOLD_STARTUP_REPLAY_RECORDS:200}
app.kafka.threshold.poll-interval-ms=${KAFKA_THRESHOLD_POLL_INTERVAL_MS:100}
app.kafka.threshold.max-poll-records=${KAFKA_THRESHOLD_MAX_POLL_RECORDS:100}
app.kafka.threshold.processing-threads=${KAFKA_THRESHOLD_PROCESSING_THREADS:2}
app.kafka.threshold.processing-queue-capacity=${KAFKA_THRESHOLD_PROCESSING_QUEUE_CAPACITY:500}
app.kafka.threshold.poller-enabled=${KAFKA_THRESHOLD_POLLER_ENABLED:false}
app.kafka.threshold.backpressure-queue-threshold-percent=${KAFKA_THRESHOLD_BACKPRESSURE_QUEUE_THRESHOLD_PERCENT:80}

# Ingestion + processing
ingestion.websocket.endpoint=/api/v1/ingestion/socket/ws
ingestion.websocket.allowed-origins=*
app.processed.csv.enabled=${PROCESSED_CSV_ENABLED:true}
app.processed.csv.dir=${PROCESSED_CSV_DIR:data/processed-readings}

# MVC + docs
spring.mvc.trailing-slash=true
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

spring.devtools.restart.enabled=false
